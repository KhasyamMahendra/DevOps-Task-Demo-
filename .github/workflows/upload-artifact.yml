name: Task 1 - Upload Files as Artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  upload-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify files exist
        run: |
          ls -l sample.csv sample.json sample.txt

      - name: Upload files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-files-artifact
          path: |
            sample.csv
            sample.json
            sample.txt
          if-no-files-found: error
          retention-days: 7
